<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Çevrimdışı çalışan akıllı alışveriş listesi uygulaması">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="apple-touch-icon" href="logo.svg">
    <title>Market Listem</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --green: #48bb78;
            --red: #f56565;
            --gray-light: #f7fafc;
            --gray-mid: #e2e8f0;
            --gray-text: #a0aec0;
            --text: #2d3748;
            --white: #ffffff;
            --shadow: 0 10px 40px rgba(102, 126, 234, 0.25);
            --radius: 14px;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 24px 16px 40px;
        }

        .app-container {
            background: var(--white);
            width: 100%;
            max-width: 460px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        .app-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 28px 28px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .app-header img {
            width: 52px;
            height: 52px;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
        }

        .header-text h1 {
            margin: 0;
            color: var(--white);
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.1;
        }

        .header-text p {
            margin: 4px 0 0;
            color: rgba(255,255,255,0.75);
            font-size: 0.82rem;
            font-weight: 600;
        }

        .item-count-badge {
            margin-left: auto;
            background: rgba(255,255,255,0.2);
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 6px 14px;
            border-radius: 50px;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        /* ── Body ── */
        .app-body { padding: 24px 24px 28px; }

        /* ── Input ── */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 13px 16px;
            border: 2px solid var(--gray-mid);
            border-radius: var(--radius);
            font-size: 1rem;
            font-family: inherit;
            font-weight: 600;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--gray-light);
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(102,126,234,0.12);
        }

        input[type="text"]::placeholder { color: var(--gray-text); font-weight: 500; }

        .btn-add {
            background: linear-gradient(135deg, var(--green), #38a169);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 0 20px;
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 4px 12px rgba(72,187,120,0.4);
            flex-shrink: 0;
        }

        .btn-add:hover  { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(72,187,120,0.5); }
        .btn-add:active { transform: scale(0.94); }

        /* ── List ── */
        ul { list-style-type: none; padding: 0; margin: 0; }

        li {
            background: var(--gray-light);
            border-left: 5px solid var(--primary);
            margin-bottom: 11px;
            padding: 13px 14px;
            border-radius: var(--radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: opacity 0.3s, transform 0.3s, background 0.2s;
            animation: itemIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes itemIn {
            from { opacity: 0; transform: translateX(-14px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .item-text {
            font-size: 1.05rem;
            color: var(--text);
            word-break: break-word;
            flex-grow: 1;
            cursor: pointer;
            font-weight: 600;
            line-height: 1.4;
            transition: color 0.2s;
        }

        li.completed {
            background: #edf2f7;
            border-left-color: var(--gray-text);
            opacity: 0.65;
        }

        li.completed .item-text {
            text-decoration: line-through;
            color: var(--gray-text);
        }

        .actions { display: flex; gap: 7px; margin-left: 12px; flex-shrink: 0; }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.15rem;
            padding: 6px;
            border-radius: 8px;
            transition: transform 0.15s, background 0.15s;
            line-height: 1;
        }

        .btn-check  { background: #e6fffa; }
        .btn-delete { background: #fff5f5; }
        .btn-icon:hover  { transform: scale(1.2); }
        .btn-icon:active { transform: scale(0.88); }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            color: var(--gray-text);
            margin-top: 24px;
            display: none;
            padding: 20px 0;
        }

        .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 8px; }
        .empty-state p { margin: 0; font-size: 0.95rem; font-weight: 600; }

        /* ── Footer ── */
        .app-footer {
            text-align: center;
            padding: 0 24px 20px;
            color: var(--gray-text);
            font-size: 0.78rem;
            font-weight: 600;
        }

        .pwa-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--gray-light);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            border: 1.5px solid var(--gray-mid);
        }
    </style>
</head>
<body>
<div class="app-container">

    <!-- Header -->
    <div class="app-header">
        <img src="logo.svg" alt="Market Listem Logo">
        <div class="header-text">
            <h1>Market Listem</h1>
            <p>Alışverişi organize et</p>
        </div>
        <div class="item-count-badge" id="countBadge">0 ürün</div>
    </div>

    <!-- Body -->
    <div class="app-body">
        <div class="input-group">
            <input type="text" id="itemInput" placeholder="Ne alacaksınız?" autocomplete="off">
            <button class="btn-add" onclick="addItem()" title="Ekle">+</button>
        </div>

        <ul id="shoppingList"></ul>

        <div class="empty-state" id="emptyState">
            <span class="empty-icon">🛒</span>
            <p>Listeniz şu an boş.<br>Yukarıdan ürün ekleyebilirsiniz.</p>
        </div>
    </div>

    <!-- Footer -->
    <div class="app-footer">
        <span class="pwa-badge">⚡ Çevrimdışı çalışır</span>
    </div>

</div>

<script>
    // Service Worker kaydı
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW aktif:', reg.scope))
                .catch(err => console.warn('SW kurulamadı:', err));
        });
    }

    const itemInput   = document.getElementById('itemInput');
    const shoppingList = document.getElementById('shoppingList');
    const emptyState  = document.getElementById('emptyState');
    const countBadge  = document.getElementById('countBadge');

    let itemsArray = JSON.parse(localStorage.getItem('myShoppingList')) || [];

    // ── Audio ──────────────────────────────────────────
    let audioCtx = null;
    function playSound(type) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc  = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const t = audioCtx.currentTime;
            if (type === 'add') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, t);
                osc.frequency.exponentialRampToValueAtTime(600, t + 0.1);
                gain.gain.setValueAtTime(0.5, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                osc.start(t); osc.stop(t + 0.1);
            } else if (type === 'check') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, t);
                osc.frequency.exponentialRampToValueAtTime(1200, t + 0.15);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                osc.start(t); osc.stop(t + 0.3);
            } else if (type === 'delete') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(50, t + 0.1);
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                osc.start(t); osc.stop(t + 0.1);
            }
        } catch (e) { /* ses desteklenmiyor */ }
    }

    // ── Init ───────────────────────────────────────────
    function init() {
        itemsArray.forEach(item => createDOMElement(item));
        updateUI();
    }

    function save() { localStorage.setItem('myShoppingList', JSON.stringify(itemsArray)); }

    itemInput.addEventListener('keypress', e => { if (e.key === 'Enter') addItem(); });

    // ── Add ────────────────────────────────────────────
    function addItem() {
        const text = itemInput.value.trim();
        if (!text) return;
        playSound('add');
        const item = { id: Date.now(), text, completed: false };
        itemsArray.push(item);
        save();
        createDOMElement(item);
        itemInput.value = '';
        itemInput.focus();
        updateUI();
    }

    // ── DOM Element ────────────────────────────────────
    function createDOMElement(item) {
        const li = document.createElement('li');
        if (item.completed) li.classList.add('completed');

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;
        span.onclick = () => toggleComplete(item.id, li);

        const actions = document.createElement('div');
        actions.className = 'actions';

        const checkBtn = document.createElement('button');
        checkBtn.className = 'btn-icon btn-check';
        checkBtn.innerHTML = '✔️';
        checkBtn.title = 'Tamamlandı';
        checkBtn.onclick = () => toggleComplete(item.id, li);

        const delBtn = document.createElement('button');
        delBtn.className = 'btn-icon btn-delete';
        delBtn.innerHTML = '🗑️';
        delBtn.title = 'Sil';
        delBtn.onclick = () => {
            playSound('delete');
            li.style.opacity = '0';
            li.style.transform = 'translateX(20px)';
            setTimeout(() => {
                li.remove();
                itemsArray = itemsArray.filter(i => i.id !== item.id);
                save();
                updateUI();
            }, 300);
        };

        actions.append(checkBtn, delBtn);
        li.append(span, actions);
        shoppingList.appendChild(li);
    }

    // ── Toggle ─────────────────────────────────────────
    function toggleComplete(id, li) {
        const item = itemsArray.find(i => i.id === id);
        if (!item) return;
        item.completed = !item.completed;
        save();
        li.classList.toggle('completed');
        if (item.completed) playSound('check');
        updateUI();
    }

    // ── UI state ───────────────────────────────────────
    function updateUI() {
        const total     = itemsArray.length;
        const remaining = itemsArray.filter(i => !i.completed).length;
        emptyState.style.display = total === 0 ? 'block' : 'none';
        countBadge.textContent   = remaining > 0
            ? `${remaining} ürün`
            : total > 0 ? '✓ Tamam!' : '0 ürün';
    }

    init();
</script>
</body>
</html>
